<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F8F7"/>
      <stop offset="1" stop-color="#F1F0ED"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007aff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#0055cc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#003d99" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="appShadow" x="-18%" y="-18%" width="136%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#003C8F" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#001F4D" flood-opacity="0.08"/>
    </filter>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1D1D1F" flood-opacity="0.1"/>
    </filter>

    <symbol id="menubarLightSource" viewBox="0 0 16 16">
      <g transform="translate(8, 8) rotate(-10) translate(-8, -8)">
        <rect x="2.8" y="7.2" width="10.24" height="6.08" rx="0.8" fill="rgba(0,0,0,0.06)" stroke="#000" stroke-width="0.2" opacity="0.3"/>
      </g>
      <g transform="translate(8, 8) rotate(-5) translate(-8, -8)">
        <rect x="2.4" y="6.08" width="10.24" height="6.08" rx="0.8" fill="rgba(0,0,0,0.08)" stroke="#000" stroke-width="0.2" opacity="0.5"/>
      </g>
      <rect x="2" y="4.96" width="10.24" height="6.08" rx="0.8" fill="#000" stroke="#000" stroke-width="0.2"/>
      <path d="M 4.8 8.32 L 5.76 9.28 L 8 7.04" fill="none" stroke="#fff" stroke-width="0.44" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 5.04 9.04 L 5.92 9.92 L 8.16 7.68" fill="none" stroke="#000" stroke-width="0.36" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </symbol>

    <symbol id="menubarDarkSource" viewBox="0 0 16 16">
      <g transform="translate(8, 8) rotate(-10) translate(-8, -8)">
        <rect x="2.8" y="7.2" width="10.24" height="6.08" rx="0.8" fill="rgba(255,255,255,0.12)" stroke="#fff" stroke-width="0.2" opacity="0.3"/>
      </g>
      <g transform="translate(8, 8) rotate(-5) translate(-8, -8)">
        <rect x="2.4" y="6.08" width="10.24" height="6.08" rx="0.8" fill="rgba(255,255,255,0.16)" stroke="#fff" stroke-width="0.2" opacity="0.5"/>
      </g>
      <rect x="2" y="4.96" width="10.24" height="6.08" rx="0.8" fill="#fff" stroke="#fff" stroke-width="0.2"/>
      <path d="M 4.8 8.32 L 5.76 9.28 L 8 7.04" fill="none" stroke="#1c1c1c" stroke-width="0.44" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 5.04 9.04 L 5.92 9.92 L 8.16 7.68" fill="none" stroke="#fff" stroke-width="0.36" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </symbol>

    <symbol id="appFinalSource" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="110" fill="url(#appGrad)"/>
      <rect width="512" height="512" rx="110" fill="url(#shineGrad)"/>
      <g transform="translate(256, 256)">
        <g opacity="0.15" transform="rotate(-8)">
          <rect x="-60" y="20" width="120" height="70" rx="12" fill="#fff" stroke="none"/>
        </g>
        <g opacity="0.25" transform="rotate(-4)">
          <rect x="-60" y="0" width="120" height="70" rx="12" fill="#fff" stroke="none"/>
        </g>
        <g transform="scale(1.8)">
          <circle cx="0" cy="0" r="85" fill="rgba(255,255,255,0.15)" stroke="none"/>
          <path d="M -40 0 L -10 30 L 50 -30" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>
    </symbol>
  </defs>

  <rect width="1280" height="720" fill="url(#pageBg)"/>

  <text x="80" y="88" fill="#1D1D1F" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="38" font-weight="760">按规范重做 ICON 样式</text>
  <text x="80" y="126" fill="#7A7A7A" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="18" font-weight="520">状态栏：使用 HTML 源码里的白色 16×16 SVG，保持 1:1 等比缩放。应用图标：使用“设计理念”源码 SVG。</text>

  <g transform="translate(90 190)">
    <rect x="0" y="0" width="500" height="380" rx="34" fill="#FFFFFF" filter="url(#softShadow)"/>
    <text x="40" y="58" fill="#1D1D1F" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="24" font-weight="750">状态栏图标</text>
    <text x="40" y="88" fill="#8A8A8A" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="520">白色版本，来自 HTML 第 71-85 行</text>
    <g transform="translate(130 104)">
      <rect x="0" y="0" width="240" height="240" rx="42" fill="#1c1c1c"/>
      <use href="#menubarDarkSource" x="0" y="0" width="240" height="240"/>
    </g>
    <g transform="translate(80 292)">
      <rect x="0" y="0" width="340" height="48" rx="24" fill="#1c1c1c"/>
      <use href="#menubarDarkSource" x="16" y="8" width="32" height="32"/>
      <text x="72" y="31" fill="#F5F5F7" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="650">16×16 等比放大 / 缩小</text>
    </g>
  </g>

  <g transform="translate(690 190)">
    <rect x="0" y="0" width="500" height="380" rx="34" fill="#FFFFFF" filter="url(#softShadow)"/>
    <text x="40" y="58" fill="#1D1D1F" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="24" font-weight="750">应用图标</text>
    <text x="40" y="88" fill="#8A8A8A" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="520">使用“设计理念”图标样式</text>
    <g transform="translate(74 86)" filter="url(#appShadow)">
      <use href="#appFinalSource" width="330" height="330"/>
    </g>
  </g>
</svg>
