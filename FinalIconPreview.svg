<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F8F7"/>
      <stop offset="1" stop-color="#F0EFEC"/>
    </linearGradient>
    <linearGradient id="menuBg" x1="128" y1="168" x2="702" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2B2B2D"/>
      <stop offset="1" stop-color="#171719"/>
    </linearGradient>
    <linearGradient id="appGradPreview" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007aff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0055cc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#003d99;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shineGradPreview" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#fff;stop-opacity:0"/>
    </linearGradient>
    <filter id="panelShadow" x="-12%" y="-12%" width="124%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#1D1D1F" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1D1D1F" flood-opacity="0.08"/>
    </filter>
    <filter id="appShadowPreview" x="-18%" y="-18%" width="136%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#003C8F" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#001F4D" flood-opacity="0.1"/>
    </filter>

    <symbol id="menubarWhiteFinal" viewBox="0 0 16 16">
      <g transform="translate(8, 8) rotate(-10) translate(-8, -8)">
        <rect x="2.8" y="7.2" width="10.24" height="6.08" rx="0.8" fill="rgba(255,255,255,0.12)" stroke="#fff" stroke-width="0.2" opacity="0.3"/>
      </g>
      <g transform="translate(8, 8) rotate(-5) translate(-8, -8)">
        <rect x="2.4" y="6.08" width="10.24" height="6.08" rx="0.8" fill="rgba(255,255,255,0.16)" stroke="#fff" stroke-width="0.2" opacity="0.5"/>
      </g>
      <rect x="2" y="4.96" width="10.24" height="6.08" rx="0.8" fill="#fff" stroke="#fff" stroke-width="0.2"/>
      <path d="M 4.8 8.32 L 5.76 9.28 L 8 7.04" fill="none" stroke="#1c1c1c" stroke-width="0.44" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 5.04 9.04 L 5.92 9.92 L 8.16 7.68" fill="none" stroke="#fff" stroke-width="0.36" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </symbol>

    <symbol id="appIconFinal" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="110" fill="url(#appGradPreview)"/>
      <rect width="512" height="512" rx="110" fill="url(#shineGradPreview)"/>
      <g transform="translate(256, 256)">
        <g opacity="0.15" transform="rotate(-8)">
          <rect x="-60" y="20" width="120" height="70" rx="12" fill="#fff" stroke="none"/>
        </g>
        <g opacity="0.25" transform="rotate(-4)">
          <rect x="-60" y="0" width="120" height="70" rx="12" fill="#fff" stroke="none"/>
        </g>
        <g transform="scale(1.8)">
          <circle cx="0" cy="0" r="85" fill="rgba(255,255,255,0.15)" stroke="none"/>
          <path d="M -40 0 L -10 30 L 50 -30" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>
    </symbol>
  </defs>

  <rect width="1280" height="720" fill="url(#pageBg)"/>
  <text x="92" y="86" fill="#1D1D1F" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="38" font-weight="760">最终 ICON 效果</text>
  <text x="92" y="124" fill="#777" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="18" font-weight="520">状态栏白色 SVG 保持 16×16 原始比例；App 图标保持 512×512 原始比例。</text>

  <g transform="translate(92 168)" filter="url(#panelShadow)">
    <rect x="0" y="0" width="610" height="356" rx="34" fill="#FFFFFF"/>
    <text x="36" y="58" fill="#1D1D1F" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="24" font-weight="750">状态栏图标</text>
    <text x="36" y="88" fill="#858585" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="520">白色版本，来自 HTML 源码</text>

    <rect x="36" y="124" width="538" height="72" rx="22" fill="url(#menuBg)"/>
    <circle cx="82" cy="160" r="18" fill="#3A3A3D"/>
    <use href="#menubarWhiteFinal" x="70" y="148" width="24" height="24"/>
    <text x="120" y="166" fill="#F5F5F7" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="18" font-weight="650">菜单栏 24×24 预览</text>
    <text x="412" y="166" fill="#C9C9CC" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="560">19 KB/s</text>
    <circle cx="512" cy="160" r="5" fill="#C9C9CC"/>
    <circle cx="534" cy="160" r="5" fill="#C9C9CC"/>

    <rect x="58" y="230" width="84" height="84" rx="24" fill="#1C1C1C"/>
    <use href="#menubarWhiteFinal" x="74" y="246" width="52" height="52"/>
    <text x="172" y="265" fill="#1D1D1F" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="18" font-weight="700">放大检查</text>
    <text x="172" y="294" fill="#858585" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="15" font-weight="520">等比缩放，没有拉伸</text>
  </g>

  <g transform="translate(770 168)">
    <text x="0" y="58" fill="#1D1D1F" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="24" font-weight="750">应用图标</text>
    <text x="0" y="88" fill="#858585" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="520">设计理念 SVG 原始效果</text>
    <g transform="translate(18 122)" filter="url(#appShadowPreview)">
      <use href="#appIconFinal" width="322" height="322"/>
    </g>
  </g>
</svg>
